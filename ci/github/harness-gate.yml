# 合入门:在 agent 够不到的隔离环境裁决。拷到你项目的 .github/workflows/ 下。
# 前提(在平台 UI 配,见 ci/branch-protection.md):
#   - main 受保护、需 PR、需本 gate 通过才能合并;关闭直推。
#   - agent 只能 push / 开 MR,没有合并权限。
name: harness-gate
on:
  pull_request:
    branches: [ main ]

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4        # 干净检出,不复用任何 agent 沙箱状态
        with:
          fetch-depth: 0                 # 需历史以便按改动选契约(可选)
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装依赖(含 harness 工具)
        run: npm ci

      # (可选)启动被测服务,供 http 契约黑盒打;视项目而定
      # - name: 启动服务
      #   run: docker compose up -d && ./scripts/wait-for-health.sh

      # 1) 先证明门禁自己没瞎:用契约自带 examples 标定每个插件
      - name: meta — 验证验证器
        run: npx harness meta --dir contracts

      # 2) 合入裁决:全量回归基线。退出码 0=放行 / 1=失败(含 error、规格错、契约被篡改) / 2=待人工决策(blocked,合并被挡)
      - name: check — 全量门禁
        run: npx harness check --dir contracts --config harness.config.json --base-url http://127.0.0.1:8080

      # 贵检查(全量 e2e / 压测 / 全量安全)放到 nightly 工作流,不进每个 PR(成本分层)。
